  // DOM Elements
  const elements = {
    levelBtns: document.querySelectorAll('.level-btn'),
    cardModal: document.getElementById('cardModal'),
    cardType: document.getElementById('cardType'),
    cardBody: document.getElementById('cardBody'),
    prevBtn: document.getElementById('prevBtn'),
    nextBtn: document.getElementById('nextBtn'),
    closeBtn: document.getElementById('closeBtn'),
    starsCounter: document.getElementById('starsCounter'),
    totalStars: document.getElementById('totalStars'),
    currentLevelInfo: document.getElementById('currentLevelInfo'),
    scienceStars: document.getElementById('scienceStars'),
    sectionTitle: document.getElementById('sectionTitle')
  };

  // Initialize
  onAuthStateChanged(auth, async (user) => {
    currentUser = user;
    if (user) {
      await loadUserProgress();
    } else {
      // Redirect to login if not authenticated
      window.location.href = 'login.html';
      return;
    }
    setupEventListeners();
  });

  function setupEventListeners() {
    elements.levelBtns.forEach(btn => {
      btn.addEventListener('click', handleLevelClick);
    });
    
    elements.prevBtn.addEventListener('click', prevCard);
    elements.nextBtn.addEventListener('click', nextCard);
    elements.closeBtn.addEventListener('click', closeCard);
    
    elements.prevBtn.disabled = true;
  }

  async function loadUserProgress() {
    const userRef = ref(db, `users/${currentUser.uid}`);
    onValue(userRef, (snapshot) => {
      userData = snapshot.val();
      if (userData) {
        // Load science progress or initialize if doesn't exist
        if (userData.science) {
          scienceProgress = userData.science;
        } else {
          scienceProgress = { 
            currentLevel: 1, 
            stars: 0, 
            totalStars: 0, 
            completed: [],
            levelDetails: {} // Store detailed level progress
          };
        }
        
        // Also check for progress in the old format (userData.progress?.science)
        if (userData.progress?.science && typeof userData.progress.science === 'number') {
          scienceProgress.currentLevel = Math.max(scienceProgress.currentLevel, userData.progress.science + 1);
          scienceProgress.stars = (userData.progress.science || 0) * 10;
          scienceProgress.totalStars = (userData.progress.science || 0) * 10;
        }
        
        updateUI();
      }
    });
  }

  function updateUI() {
    elements.levelBtns.forEach(btn => {
      const levelNum = parseInt(btn.dataset.level);
      btn.classList.remove('completed', 'locked');
      
      if (scienceProgress.completed.includes(levelNum)) {
        btn.classList.add('completed');
      } else if (levelNum > scienceProgress.currentLevel) {
        btn.classList.add('locked');
      }
    });
    
    elements.currentLevelInfo.textContent = scienceProgress.currentLevel;
    elements.scienceStars.textContent = scienceProgress.stars || 0;
  }

  function handleLevelClick() {
    const levelNum = parseInt(this.dataset.level);
    
    if (this.classList.contains('locked')) {
      alert('🔒 Complete previous levels first!');
      return;
    }
    
    // Check if level is already completed
    const isLevelCompleted = scienceProgress.completed.includes(levelNum);
    
    currentLevelNumber = levelNum;
    loadLevelContent(levelNum, isLevelCompleted);
    showCardModal();
  }

  function loadLevelContent(levelNum, isLevelCompleted = false) {
  // Load content for each level
  switch(levelNum) {
    case 1:
      currentLevelCards = scienceLevel1.cards;
      elements.sectionTitle.textContent = scienceLevel1.title;
      break;
    case 2:
      currentLevelCards = scienceLevel2.cards;
      elements.sectionTitle.textContent = scienceLevel2.title;
      break;
    case 3:
      currentLevelCards = scienceLevel3.cards;
      elements.sectionTitle.textContent = scienceLevel3.title;
      break;
    case 4:
      currentLevelCards = scienceLevel4.cards;
      elements.sectionTitle.textContent = scienceLevel4.title;
      break;
    case 5:
      currentLevelCards = scienceLevel5.cards;
      elements.sectionTitle.textContent = scienceLevel5.title;
      break;
    default:
      // Placeholder for levels 6-10
      currentLevelCards = [
        { type: "📚", content: `Level ${levelNum} - More science adventures coming soon!`, isQuiz: false },
        { type: "⭐", content: `🎉 Level ${levelNum} will be available soon! Keep exploring!`, isQuiz: false }
      ];
      elements.sectionTitle.textContent = `🔬 Science Space - Level ${levelNum}`;
  }
  
  currentCardIndex = 0;
  quizAnswers = {};
  quizSubmitted = false;
  levelStarsEarned = 0;
  
  // If level is already completed, load previous answers
  if (isLevelCompleted && scienceProgress.levelDetails && scienceProgress.levelDetails[levelNum]) {
    quizAnswers = scienceProgress.levelDetails[levelNum].answers || {};
    levelStarsEarned = scienceProgress.levelDetails[levelNum].stars || 0;
  }
  
  showCurrentCard();
}

  function showCardModal() {
    elements.cardModal.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeCard() {
    elements.cardModal.style.display = 'none';
    document.body.style.overflow = 'auto';
    
    // Reset quiz state when closing
    if (!quizSubmitted) {
      quizAnswers = {};
      levelStarsEarned = 0;
    }
  }

  function showCurrentCard() {
    const card = currentLevelCards[currentCardIndex];
    
    if (card.isQuiz) {
      renderQuiz(card);
    } else {
      elements.cardType.textContent = card.type;
      elements.cardBody.innerHTML = `<p style="margin: 0;">${card.content}</p>`;
    }

    // Update navigation buttons
    elements.prevBtn.disabled = currentCardIndex === 0;
    const isLastCard = currentCardIndex === currentLevelCards.length - 1;
    
    // Calculate current stars (only count quiz cards that have been answered)
    let earnedStars = 0;
    if (quizSubmitted) {
      earnedStars = levelStarsEarned;
    } else {
      // Count only correctly answered quiz cards
      Object.keys(quizAnswers).forEach(cardIdx => {
        const cardIndex = parseInt(cardIdx);
        if (currentLevelCards[cardIndex]?.isQuiz) {
          const cardData = currentLevelCards[cardIndex].content;
          if (quizAnswers[cardIndex] === cardData.correct) {
            earnedStars += 1;
          }
        }
      });
    }
    
    elements.starsCounter.textContent = earnedStars;
    elements.totalStars.textContent = '5'; // Only 5 test cards give stars
    
    // Update next button text
    if (isLastCard) {
      if (quizSubmitted) {
        elements.nextBtn.textContent = '🎉 Finish Level!';
      } else {
        elements.nextBtn.textContent = '📊 Check Results';
      }
    } else {
      elements.nextBtn.textContent = 'Next →';
    }
  }

  function renderQuiz(card) {
    const q = card.content;
    elements.cardType.textContent = card.type;
    
    let html = `
      <div class="quiz-question">
        <div class="question-text">${q.question}</div>
        <div class="quiz-options">`;
    
    q.options.forEach((option, index) => {
      const selected = quizAnswers[currentCardIndex] === index;
      const isCorrectAnswer = index === q.correct;
      let classes = 'quiz-option';
      
      if (selected) {
        classes += ' selected';
        if (quizSubmitted) {
          classes += isCorrectAnswer ? ' correct' : ' incorrect';
        }
      }
      
      // If quiz is submitted, show correct answer
      if (quizSubmitted && isCorrectAnswer && !selected) {
        classes += ' correct';
      }
      
      // Disable clicking after submission
      const onClick = quizSubmitted ? '' : `onclick="selectAnswer(${currentCardIndex}, ${index})"`;
      const style = quizSubmitted ? 'cursor: default;' : '';
      
      html += `<div class="${classes}" ${onClick} style="${style}">${option}</div>`;
    });
    
    // Show explanation if quiz is submitted
    if (quizSubmitted && q.explanation) {
      html += `<div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; font-size: 14px;">
                <strong>💡 Explanation:</strong> ${q.explanation}
              </div>`;
    }
    
    html += `</div></div>`;
    elements.cardBody.innerHTML = html;
  }

  // Global function for quiz selection
  window.selectAnswer = function(cardIndex, optionIndex) {
    if (quizSubmitted) return; // Don't allow changes after submission
    
    quizAnswers[cardIndex] = optionIndex;
    showCurrentCard(); // Refresh to show selection
  };

  function prevCard() {
    if (currentCardIndex > 0) {
      currentCardIndex--;
      showCurrentCard();
    }
  }

  function nextCard() {
    const currentCard = currentLevelCards[currentCardIndex];
    
    // If it's a quiz card and not submitted yet, require an answer
    if (currentCard?.isQuiz && !quizSubmitted && quizAnswers[currentCardIndex] === undefined) {
      alert('⚠️ Please select an answer before proceeding!');
      return;
    }
    
    // If it's the last card and not submitted yet
    if (currentCardIndex === currentLevelCards.length - 1 && !quizSubmitted) {
      submitQuiz();
      return;
    }
    
    // If it's the last card and already submitted, complete the level
    if (currentCardIndex === currentLevelCards.length - 1 && quizSubmitted) {
      completeLevel();
      return;
    }
    
    // Otherwise, go to next card
    if (currentCardIndex < currentLevelCards.length - 1) {
      currentCardIndex++;
      showCurrentCard();
    }
  }

  function submitQuiz() {
    // Calculate stars earned
    let stars = 0;
    Object.keys(quizAnswers).forEach(cardIdx => {
      const idx = parseInt(cardIdx);
      if (currentLevelCards[idx]?.isQuiz) {
        const cardData = currentLevelCards[idx].content;
        if (quizAnswers[idx] === cardData.correct) {
          stars += 1;
        }
      }
    });
    
    levelStarsEarned = stars;
    quizSubmitted = true;
    
    // Show results
    alert(`📊 Quiz Results!\n\n✅ You got ${stars} out of 5 questions correct!\n⭐ You earned ${stars} stars!`);
    
    // Update the current card to show results
    showCurrentCard();
  }

  async function completeLevel() {
    // Calculate total stars for this level
    const starsEarned = levelStarsEarned;
    
    // Update local progress
    if (!scienceProgress.completed.includes(currentLevelNumber)) {
      scienceProgress.completed.push(currentLevelNumber);
      scienceProgress.stars = (scienceProgress.stars || 0) + starsEarned;
      scienceProgress.totalStars = (scienceProgress.totalStars || 0) + 5; // 5 possible stars per level
      
      // Store detailed level progress
      if (!scienceProgress.levelDetails) {
        scienceProgress.levelDetails = {};
      }
      scienceProgress.levelDetails[currentLevelNumber] = {
        stars: starsEarned,
        answers: { ...quizAnswers },
        completedDate: new Date().toISOString()
      };
      
      // Unlock next level if not already unlocked
      if (currentLevelNumber === scienceProgress.currentLevel) {
        scienceProgress.currentLevel = Math.min(10, currentLevelNumber + 1);
      }
    }
    
    // Update Firebase
    if (currentUser) {
      try {
        const updates = {};
        const userRef = ref(db, `users/${currentUser.uid}`);
        
        // Update science progress
        updates[`science`] = scienceProgress;
        
        // Also update the old progress format for compatibility with other pages
        const completedLevels = scienceProgress.completed.length;
        updates[`progress/science`] = completedLevels;
        
        // Update total stars in profile
        const currentTotalStars = userData?.score || 0;
        updates[`score`] = currentTotalStars + starsEarned;
        
        // Update streak
        await updateStreak();
        
        // Apply all updates
        await update(userRef, updates);
        
        console.log('Progress saved to Firebase:', updates);
        
        // Show completion message
        let badgeMessage = '';
        if (currentLevelNumber % 3 === 0) {
          badgeMessage = `\n🎖️ You earned a badge for completing 3 levels!`;
        }
        
        alert(`🎉 Level ${currentLevelNumber} COMPLETED!\n\n⭐ Stars Earned: ${starsEarned}/5${badgeMessage}\n\n✅ Level ${scienceProgress.currentLevel} is now unlocked!`);
        
      } catch (error) {
        console.error('Error saving progress:', error);
        alert('⚠️ Error saving progress. Please check your connection.');
      }
    }
    
    updateUI();
    closeCard();
  }

  async function updateStreak() {
    try {
      const today = new Date().toDateString();
      const lastLogin = userData?.lastLogin ? new Date(userData.lastLogin).toDateString() : null;
      
      let currentStreak = userData?.streak || 0;
      
      if (lastLogin === today) {
        // Already logged in today
        return currentStreak;
      } else if (lastLogin && isYesterday(new Date(lastLogin))) {
        // Consecutive day
        currentStreak += 1;
      } else {
        // New streak or broken streak
        currentStreak = 1;
      }
      
      // Update in database
      const userRef = ref(db, `users/${currentUser.uid}`);
      await update(userRef, {
        streak: currentStreak,
        lastLogin: new Date().toISOString()
      });
      
      return currentStreak;
    } catch (error) {
      console.error('Error updating streak:', error);
      return 0;
    }
  }

  function isYesterday(date) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    return date.toDateString() === yesterday.toDateString();
  }

  // Modal backdrop click
  elements.cardModal.addEventListener('click', (e) => {
    if (e.target === elements.cardModal) closeCard();
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (elements.cardModal.style.display === 'flex') {
      if (e.key === 'ArrowLeft') prevCard();
      if (e.key === 'ArrowRight' || e.key === ' ') {
        e.preventDefault(); // Prevent space from scrolling
        nextCard();
      }
      if (e.key === 'Escape') closeCard();
    }
  });
</script>
</body>
</html>
