<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Profile | LearnFun</title>
  <link rel="stylesheet" href="css/profile.css">
  
  <!-- Firebase CDN -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js"
    }
  }
  </script>
</head>
<body>
<!-- Top Navigation -->
<header class="top-nav">
  <h2>🎮 LearnFun</h2>
  <a href="home.html" class="back-btn">⬅ Back to Home</a>
</header>

<!-- Profile Container -->
<div class="profile-container">
  <!-- Avatar Section -->
  <div class="avatar-card">
    <img id="userAvatar" src="assets/images/avatar1.avif" alt="Avatar">
    <h3 id="userName">Hello, Loading... 👋</h3>
    <p id="userDob">Date of Birth: Loading...</p>
  </div>

  <!-- Stats Section -->
  <div class="stats">
    <div class="stat-box">
      ⭐ <h4>Score</h4>
      <p id="userScore">0</p>
    </div>
    <div class="stat-box">
      🔥 <h4>Streak</h4>
      <p id="userStreak">0 Days</p>
    </div>
    <div class="stat-box">
      🏆 <h4>Badges</h4>
      <p id="userBadges">0</p>
    </div>
  </div>

  <!-- Course Progress -->
  <div class="progress-card">
    <h3>📘 Course Progress</h3>

    <div class="progress-item">
      <span>🔢 Math Land</span>
      <div class="progress-bar">
        <div id="mathProgress" class="progress-fill math" style="width: 0%"></div>
      </div>
    </div>

    <div class="progress-item">
      <span>📖 Word Jungle</span>
      <div class="progress-bar">
        <div id="wordProgress" class="progress-fill word" style="width: 0%"></div>
      </div>
    </div>

    <div class="progress-item">
      <span>🔬 Science Space</span>
      <div class="progress-bar">
        <div id="scienceProgress" class="progress-fill science" style="width: 0%"></div>
      </div>
    </div>

    <div class="progress-item">
      <span>🧩 Logic Cave</span>
      <div class="progress-bar">
        <div id="logicProgress" class="progress-fill logic" style="width: 0%"></div>
      </div>
    </div>
  </div>

  <!-- Motivation Message -->
  <div class="motivation">
    🎉 Keep playing and learning! You are doing great!
  </div>
</div>

<script type="module">
  // Firebase CDN Setup
  import { initializeApp } from 'firebase/app';
  import { getAuth, onAuthStateChanged } from 'firebase/auth';
  import { getDatabase, ref, onValue } from 'firebase/database';

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyA1lno70d82bnOlBeb0ShRS-PW6cE4PAX8",
    authDomain: "learnapp-683e9.firebaseapp.com",
    projectId: "learnapp-683e9",
    storageBucket: "learnapp-683e9.firebasestorage.app",
    messagingSenderId: "989728103752",
    appId: "1:989728103752:web:c0a228b0d2ef2e6cf3277d"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Protect page - redirect if not logged in
  onAuthStateChanged(auth, (user) => {
    if (!user) {
      window.location.href = 'login.html';
      return;
    }
    
    // Load user data from database
    loadUserProfile(user.uid);
  });

  function loadUserProfile(uid) {
    const userRef = ref(db, `users/${uid}`);
    
    onValue(userRef, (snapshot) => {
      const userData = snapshot.val();
      if (userData) {
        updateProfileUI(userData);
      } else {
        console.log('No user data found');
      }
    }, (error) => {
      console.error('Error loading profile:', error);
    });
  }

  function updateProfileUI(userData) {
    // Avatar and personal info
    document.getElementById('userAvatar').src = userData.avatarUrl || 'assets/images/avatar1.avif';
    document.getElementById('userName').textContent = `Hello, ${userData.username || userData.name?.split(' ')[0] || 'Student'} 👋`;
    
    // Format DOB
    if (userData.dob) {
      const dob = new Date(userData.dob).toLocaleDateString('en-GB');
      document.getElementById('userDob').textContent = `Date of Birth: ${dob}`;
    }
    
    // Stats
    document.getElementById('userScore').textContent = userData.score || 0;
    document.getElementById('userStreak').textContent = `${userData.streak || 0} Days`;
    document.getElementById('userBadges').textContent = userData.badges || 0;
    
    // Course progress bars (0-10 levels = 0-100%)
    const progressPercent = (value) => {
      // Check both old format (progress object) and new format (science object)
      let levelsCompleted = 0;
      
      if (value === 'science' && userData.science?.completed) {
        // For science, use the new detailed format
        levelsCompleted = userData.science.completed.length || 0;
      } else if (userData.progress?.[value]) {
        // For other courses, use the old format
        levelsCompleted = userData.progress[value] || 0;
      }
      
      return Math.min(100, Math.max(0, (levelsCompleted / 10) * 100));
    };
    
    document.getElementById('mathProgress').style.width = `${progressPercent('math')}%`;
    document.getElementById('wordProgress').style.width = `${progressPercent('word')}%`;
    document.getElementById('scienceProgress').style.width = `${progressPercent('science')}%`;
    document.getElementById('logicProgress').style.width = `${progressPercent('logic')}%`;
    
    console.log('Profile loaded for:', userData.name || userData.username);
  }
</script>
</body>
</html>
