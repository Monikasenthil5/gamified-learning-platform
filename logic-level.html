<!DOCTYPE html>
<html lang="en">
<head>
  <title>🧩 Logic Cave - Levels</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Firebase CDN -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js"
    }
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Top Navigation - LOGIC CAVE THEME */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #FF9F43, #FFD93D);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 24px; font-weight: 700; color: #2D1B00; }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-link {
      color: #2D1B00; text-decoration: none; font-weight: 500;
      padding: 8px 16px; border-radius: 20px; transition: all 0.3s ease;
    }
    .nav-link:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
    .back-btn {
      background: rgba(255,255,255,0.3); padding: 10px 20px;
      border-radius: 25px; font-weight: 600; color: #2D1B00;
    }
    .progress-info {
      background: rgba(255,255,255,0.25); padding: 8px 16px;
      border-radius: 20px; font-size: 14px; font-weight: 500; color: #2D1B00;
    }

    /* Main Content - FULL WIDTH */
    .main-content { margin-top: 90px; padding: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }

    /* Level Map - LOGIC CAVE THEME */
    .level-section { text-align: center; margin-bottom: 40px; }
    .section-title {
      font-size: 32px; background: linear-gradient(135deg, #FFD93D, #FF6B6B);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px; font-weight: 700;
    }
    .map-container { display: flex; justify-content: center; align-items: center; margin: 30px 0; }
    .map-bg {
      position: relative; width: 950px; height: 450px; max-width: 95vw;
      border-radius: 35px; background: linear-gradient(135deg, #F8C8DC 0%, #FFEAA7 25%, #FFD3B6 50%, #A8E6CF 75%, #D4A5A5 100%);
      box-shadow: 0 15px 40px rgba(255,159,67,0.4), 0 8px 25px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .map-bg::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80px 40px at 12% 18%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 28% 32%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 45% 22%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 62% 38%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 82% 25%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 20% 68%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 38% 78%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 55% 70%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 75% 82%, #FFF9C4 0%, #FFF9C4 35px, transparent 38px);
      opacity: 0.95;
    }

    /* Level Buttons - LOGIC THEME */
    .level-btn {
      position: absolute; width: 75px; height: 75px; border-radius: 50%;
      border: 6px solid #FF6B6B; background: radial-gradient(circle at 25% 25%, #ffffff 0%, #FFEAA7 40%, #FF9F43 100%);
      color: #5A2700; font-size: 26px; font-weight: 800; cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 3px 8px rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; user-select: none;
    }
    .level-btn:hover:not(.locked):not(.completed) {
      transform: translateY(-5px) scale(1.08); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      border-color: #6BCF9D;
    }
    .level-btn.locked {
      background: radial-gradient(circle at 25% 25%, #e0e0e0 0%, #b0b0b0 70%, #808080 100%);
      border-color: #888; color: #555; cursor: not-allowed; opacity: 0.7;
    }
    .level-btn.completed {
      background: radial-gradient(circle at 25% 25%, #FFEAA7 0%, #FFD93D 45%, #FF9F43 100%);
      border-color: #6BCF9D; color: #5a2700; animation: sparkle 2s infinite;
    }
    @keyframes sparkle {
      0%, 100% { box-shadow: 0 8px 20px rgba(255,215,0,0.6); }
      50% { box-shadow: 0 12px 30px rgba(107,207,157,0.8); }
    }

    .level-1 { left: 10%; top: 15%; }
    .level-2 { left: 27%; top: 28%; }
    .level-3 { left: 44%; top: 20%; }
    .level-4 { left: 61%; top: 34%; }
    .level-5 { left: 80%; top: 22%; }
    .level-6 { left: 16%; top: 65%; }
    .level-7 { left: 34%; top: 76%; }
    .level-8 { left: 52%; top: 67%; }
    .level-9 { left: 70%; top: 80%; }
    .level-10 { left: 86%; top: 70%; }

    /* Quiz Styles - LOGIC THEME */
    .quiz-question {
      background: rgba(255,255,255,0.05); border-radius: 15px;
      padding: 20px; margin: 15px 0; border-left: 4px solid #FFD93D;
    }
    .question-text { 
      font-size: 18px; margin-bottom: 15px; font-weight: 500;
      color: #FFD93D; 
    }
    .quiz-options { display: grid; gap: 10px; }
    .quiz-option {
      padding: 12px 16px; background: rgba(255,255,255,0.1);
      border-radius: 12px; border: 2px solid transparent;
      cursor: pointer; transition: all 0.2s ease; font-size: 16px;
    }
    .quiz-option:hover:not(.selected) { background: rgba(255,217,61,0.2); border-color: #FFD93D; }
    .quiz-option.selected { background: rgba(255,159,67,0.3); border-color: #FF9F43; }
    .quiz-option.correct { background: rgba(107,207,157,0.3); border-color: #6BCF9D; }
    .quiz-option.incorrect { background: rgba(255,107,107,0.3); border-color: #FF6B6B; }

    /* Card Modal - LOGIC THEME */
    .card-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(8px);
    }
    .card {
      width: 95%; max-width: 550px; max-height: 85vh;
      background: linear-gradient(135deg, #5A2700, #FF9F43, #FFD93D);
      border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      overflow: hidden; animation: cardSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(50px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header {
      padding: 20px 25px; background: rgba(0,0,0,0.3);
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-type { font-size: 20px; font-weight: 600; color: #FFEAA7; }
    .close-card {
      background: none; border: none; font-size: 28px; color: #fff;
      cursor: pointer; padding: 5px; border-radius: 50%; transition: all 0.3s ease;
    }
    .close-card:hover { background: rgba(255,255,255,0.2); }
    .card-body {
      padding: 30px; max-height: 400px; overflow-y: auto; font-size: 18px; line-height: 1.6;
    }
    .card-footer {
      padding: 20px 25px; display: flex; justify-content: space-between;
      align-items: center; background: rgba(0,0,0,0.25); gap: 15px;
    }
    .nav-btn {
      flex: 1; padding: 12px 20px; border-radius: 25px; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .nav-btn.prev { background: rgba(255,255,255,0.2); color: #fff; }
    .nav-btn.next { background: linear-gradient(45deg, #FFD93D, #FF6B6B); color: #2d1b00; }
    .nav-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .stars-display { 
      font-size: 16px; color: #FFD93D; font-weight: 600; 
      min-width: 120px; text-align: center; 
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Logic Puzzle Styles */
    .puzzle-box {
      background: rgba(255,255,255,0.1);
      border-radius: 15px;
      padding: 15px;
      margin: 10px 0;
      border: 2px dashed #FF9F43;
    }

    .pattern-example {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin: 15px 0;
    }

    .pattern-item {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #FF9F43;
      border-radius: 8px;
      font-weight: bold;
      color: #2D1B00;
    }

    @media (max-width: 768px) {
      .map-bg { width: 95vw; height: 350px; }
      .level-btn { width: 60px; height: 60px; font-size: 22px; }
      .section-title { font-size: 28px; }
      .pattern-example { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <!-- Top Nav - LOGIC CAVE THEME -->
  <nav class="top-nav">
    <div class="logo">🧩 Logic Cave</div>
    <div class="nav-links">
      <a href="profile.html" class="nav-link">👤 Profile</a>
      <a href="courses.html" class="nav-link back-btn">← Back to Courses</a>
      <div class="progress-info">
        Level <span id="currentLevelInfo">1</span>/10 | ⭐ <span id="logicStars">0</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <section class="level-section">
      <h1 class="section-title" id="sectionTitle">🧩 Logic Cave</h1>
      <div class="map-container">
        <div class="map-bg">
          <button class="level-btn level-1" data-level="1">1</button>
          <button class="level-btn level-2 locked" data-level="2">2</button>
          <button class="level-btn level-3 locked" data-level="3">3</button>
          <button class="level-btn level-4 locked" data-level="4">4</button>
          <button class="level-btn level-5 locked" data-level="5">5</button>
          <button class="level-btn level-6 locked" data-level="6">6</button>
          <button class="level-btn level-7 locked" data-level="7">7</button>
          <button class="level-btn level-8 locked" data-level="8">8</button>
          <button class="level-btn level-9 locked" data-level="9">9</button>
          <button class="level-btn level-10 locked" data-level="10">10</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Card Modal -->
  <div class="card-modal" id="cardModal">
    <div class="card">
      <div class="card-header">
        <span class="card-type" id="cardType">🧠 Thinking</span>
        <button class="close-card" id="closeBtn">×</button>
      </div>
      <div class="card-body" id="cardBody"></div>
      <div class="card-footer">
        <button class="nav-btn prev" id="prevBtn">← Previous</button>
        <div class="stars-display">
          ⭐ <span id="starsCounter">0</span> / <span id="totalStars">5</span>
        </div>
        <button class="nav-btn next" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module">
    // Firebase Config - USE YOUR ACTUAL CONFIG
    const firebaseConfig = {
  apiKey: "apikey",
  authDomain: "auth_domain",
  projectId: "project_id",
  storageBucket: "storageBucket",
  messagingSenderId: "messagingsenderId",
  appId: "appId"
};

    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged } from 'firebase/auth';
    import { getDatabase, ref, onValue, update, get } from 'firebase/database';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Level 1 Content: Logic Puzzles
    const logicLevel1 = {
      title: "🔍 Pattern Recognition",
      cards: [
        // 5 LEARNING CARDS
        { 
          type: "🧠", 
          content: "Logic is about finding patterns and solving puzzles! Look for what comes next in a sequence.",
          isQuiz: false 
        },
        { 
          type: "🔍", 
          content: "Patterns can be in shapes, numbers, or colors. Example: 🔴 🟡 🔴 🟡 🔴 ... What comes next?",
          isQuiz: false 
        },
        { 
          type: "📐", 
          content: "Logical thinking helps you solve problems step by step. Think carefully before answering!",
          isQuiz: false 
        },
        { 
          type: "💡", 
          content: "Sometimes the answer isn't obvious. Look for clues in the question and eliminate wrong answers.",
          isQuiz: false 
        },
        { 
          type: "🎯", 
          content: "Ready to test your logic skills? Let's solve some fun puzzles!",
          isQuiz: false 
        },
        
        // 5 TEST QUESTIONS - Logic Puzzles
        { 
          type: "❓", 
          content: {
            question: "What comes next in this pattern? 🔺 🔴 🔺 🔴 🔺 ?",
            options: ["🔺", "🔴", "🟡", "🟢"],
            correct: 1,
            explanation: "The pattern alternates: triangle, circle, triangle, circle... So next is 🔴"
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", 
          content: {
            question: "If all cats are animals, and Fluffy is a cat, then...",
            options: ["Fluffy is an animal", "Fluffy is not an animal", "All animals are cats", "Fluffy is a dog"],
            correct: 0,
            explanation: "Since all cats are animals, and Fluffy is a cat, Fluffy must be an animal."
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", 
          content: {
            question: "Find the odd one out: Apple, Banana, Carrot, Orange",
            options: ["Apple", "Banana", "Carrot", "Orange"],
            correct: 2,
            explanation: "Carrot is a vegetable, while Apple, Banana, and Orange are fruits."
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", 
          content: {
            question: "Complete the sequence: 2, 4, 6, 8, ?",
            options: ["9", "10", "11", "12"],
            correct: 1,
            explanation: "This is counting by 2s: 2, 4, 6, 8, 10..."
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", 
          content: {
            question: "Which shape doesn't belong? ⬛ 🟥 🔺 🟢",
            options: ["⬛", "🟥", "🔺", "🟢"],
            correct: 2,
            explanation: "Triangle (🔺) is the only shape that's not a square. All others are squares of different colors."
          }, 
          isQuiz: true 
        }
      ]
    };

    // Global State
    let currentUser = null;
    let userData = null;
    let logicProgress = { currentLevel: 1, stars: 0, totalStars: 0, completed: [] };
    let currentLevelCards = [];
    let currentCardIndex = 0;
    let quizAnswers = {};
    let quizSubmitted = false;
    let levelStarsEarned = 0;
    let currentLevelNumber = 1;

    // DOM Elements
    const elements = {
      levelBtns: document.querySelectorAll('.level-btn'),
      cardModal: document.getElementById('cardModal'),
      cardType: document.getElementById('cardType'),
      cardBody: document.getElementById('cardBody'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      closeBtn: document.getElementById('closeBtn'),
      starsCounter: document.getElementById('starsCounter'),
      totalStars: document.getElementById('totalStars'),
      currentLevelInfo: document.getElementById('currentLevelInfo'),
      logicStars: document.getElementById('logicStars'),
      sectionTitle: document.getElementById('sectionTitle')
    };

    // Initialize
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        await loadUserProgress();
      } else {
        window.location.href = 'login.html';
        return;
      }
      setupEventListeners();
    });

    function setupEventListeners() {
      elements.levelBtns.forEach(btn => {
        btn.addEventListener('click', handleLevelClick);
      });
      
      elements.prevBtn.addEventListener('click', prevCard);
      elements.nextBtn.addEventListener('click', nextCard);
      elements.closeBtn.addEventListener('click', closeCard);
      
      elements.prevBtn.disabled = true;
    }

    async function loadUserProgress() {
      const userRef = ref(db, `users/${currentUser.uid}`);
      onValue(userRef, (snapshot) => {
        userData = snapshot.val();
        if (userData) {
          // Load logic progress or initialize if doesn't exist
          if (userData.logic) {
            logicProgress = userData.logic;
          } else {
            logicProgress = { 
              currentLevel: 1, 
              stars: 0, 
              totalStars: 0, 
              completed: [],
              levelDetails: {}
            };
          }
          
          // Check for progress in the old format
          if (userData.progress?.logic && typeof userData.progress.logic === 'number') {
            logicProgress.currentLevel = Math.max(logicProgress.currentLevel, userData.progress.logic + 1);
            logicProgress.stars = (userData.progress.logic || 0) * 5;
            logicProgress.totalStars = (userData.progress.logic || 0) * 5;
          }
          
          updateUI();
        }
      });
    }

    function updateUI() {
      elements.levelBtns.forEach(btn => {
        const levelNum = parseInt(btn.dataset.level);
        btn.classList.remove('completed', 'locked');
        
        if (logicProgress.completed.includes(levelNum)) {
          btn.classList.add('completed');
        } else if (levelNum > logicProgress.currentLevel) {
          btn.classList.add('locked');
        }
      });
      
      elements.currentLevelInfo.textContent = logicProgress.currentLevel;
      elements.logicStars.textContent = logicProgress.stars || 0;
    }

    function handleLevelClick() {
      const levelNum = parseInt(this.dataset.level);
      
      if (this.classList.contains('locked')) {
        alert('🔒 Complete previous levels first!');
        return;
      }
      
      const isLevelCompleted = logicProgress.completed.includes(levelNum);
      
      currentLevelNumber = levelNum;
      loadLevelContent(levelNum, isLevelCompleted);
      showCardModal();
    }

    function loadLevelContent(levelNum, isLevelCompleted = false) {
      if (levelNum === 1) {
        currentLevelCards = logicLevel1.cards;
        elements.sectionTitle.textContent = logicLevel1.title;
      } else {
        // Placeholder for other levels
        currentLevelCards = [
          { type: "🧠", content: `Level ${levelNum} - More Logic Puzzles Coming Soon!`, isQuiz: false },
          { type: "⭐", content: `🎉 Level ${levelNum} will be available soon! Keep exercising your brain!`, isQuiz: false }
        ];
      }
      
      currentCardIndex = 0;
      quizAnswers = {};
      quizSubmitted = false;
      levelStarsEarned = 0;
      
      // If level is already completed, load previous answers
      if (isLevelCompleted && logicProgress.levelDetails && logicProgress.levelDetails[levelNum]) {
        quizAnswers = logicProgress.levelDetails[levelNum].answers || {};
        levelStarsEarned = logicProgress.levelDetails[levelNum].stars || 0;
      }
      
      showCurrentCard();
    }

    function showCardModal() {
      elements.cardModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeCard() {
      elements.cardModal.style.display = 'none';
      document.body.style.overflow = 'auto';
      
      if (!quizSubmitted) {
        quizAnswers = {};
        levelStarsEarned = 0;
      }
    }

    function showCurrentCard() {
      const card = currentLevelCards[currentCardIndex];
      
      if (card.isQuiz) {
        renderQuiz(card);
      } else {
        elements.cardType.textContent = card.type;
        elements.cardBody.innerHTML = `<p style="margin: 0; font-size: 18px; line-height: 1.6;">${card.content}</p>`;
      }

      elements.prevBtn.disabled = currentCardIndex === 0;
      const isLastCard = currentCardIndex === currentLevelCards.length - 1;
      
      // Calculate current stars
      let earnedStars = 0;
      if (quizSubmitted) {
        earnedStars = levelStarsEarned;
      } else {
        Object.keys(quizAnswers).forEach(cardIdx => {
          const cardIndex = parseInt(cardIdx);
          if (currentLevelCards[cardIndex]?.isQuiz) {
            const cardData = currentLevelCards[cardIndex].content;
            if (quizAnswers[cardIndex] === cardData.correct) {
              earnedStars += 1;
            }
          }
        });
      }
      
      elements.starsCounter.textContent = earnedStars;
      elements.totalStars.textContent = '5';
      
      // Update next button text
      if (isLastCard) {
        if (quizSubmitted) {
          elements.nextBtn.textContent = '🎉 Finish Level!';
        } else {
          elements.nextBtn.textContent = '📊 Check Results';
        }
      } else {
        elements.nextBtn.textContent = 'Next →';
      }
    }

    function renderQuiz(card) {
      const q = card.content;
      elements.cardType.textContent = card.type;
      
      let html = `
        <div class="quiz-question">
          <div class="question-text">${q.question}</div>
          <div class="quiz-options">`;
      
      q.options.forEach((option, index) => {
        const selected = quizAnswers[currentCardIndex] === index;
        const isCorrectAnswer = index === q.correct;
        let classes = 'quiz-option';
        
        if (selected) {
          classes += ' selected';
          if (quizSubmitted) {
            classes += isCorrectAnswer ? ' correct' : ' incorrect';
          }
        }
        
        if (quizSubmitted && isCorrectAnswer && !selected) {
          classes += ' correct';
        }
        
        const onClick = quizSubmitted ? '' : `onclick="selectAnswer(${currentCardIndex}, ${index})"`;
        const style = quizSubmitted ? 'cursor: default;' : '';
        
        html += `<div class="${classes}" ${onClick} style="${style}">${option}</div>`;
      });
      
      if (quizSubmitted && q.explanation) {
        html += `<div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; font-size: 14px;">
                  <strong>💡 Explanation:</strong> ${q.explanation}
                </div>`;
      }
      
      html += `</div></div>`;
      elements.cardBody.innerHTML = html;
    }

    // Global function for quiz selection
    window.selectAnswer = function(cardIndex, optionIndex) {
      if (quizSubmitted) return;
      
      quizAnswers[cardIndex] = optionIndex;
      showCurrentCard();
    };

    function prevCard() {
      if (currentCardIndex > 0) {
        currentCardIndex--;
        showCurrentCard();
      }
    }

    function nextCard() {
      const currentCard = currentLevelCards[currentCardIndex];
      
      if (currentCard?.isQuiz && !quizSubmitted && quizAnswers[currentCardIndex] === undefined) {
        alert('⚠️ Please select an answer before proceeding!');
        return;
      }
      
      if (currentCardIndex === currentLevelCards.length - 1 && !quizSubmitted) {
        submitQuiz();
        return;
      }
      
      if (currentCardIndex === currentLevelCards.length - 1 && quizSubmitted) {
        completeLevel();
        return;
      }
      
      if (currentCardIndex < currentLevelCards.length - 1) {
        currentCardIndex++;
        showCurrentCard();
      }
    }

    function submitQuiz() {
      let stars = 0;
      Object.keys(quizAnswers).forEach(cardIdx => {
        const idx = parseInt(cardIdx);
        if (currentLevelCards[idx]?.isQuiz) {
          const cardData = currentLevelCards[idx].content;
          if (quizAnswers[idx] === cardData.correct) {
            stars += 1;
          }
        }
      });
      
      levelStarsEarned = stars;
      quizSubmitted = true;
      
      alert(`📊 Quiz Results!\n\n✅ You solved ${stars} out of 5 puzzles correctly!\n⭐ You earned ${stars} stars!`);
      
      showCurrentCard();
    }

    async function completeLevel() {
      const starsEarned = levelStarsEarned;
      
      if (!logicProgress.completed.includes(currentLevelNumber)) {
        logicProgress.completed.push(currentLevelNumber);
        logicProgress.stars = (logicProgress.stars || 0) + starsEarned;
        logicProgress.totalStars = (logicProgress.totalStars || 0) + 5;
        
        if (!logicProgress.levelDetails) {
          logicProgress.levelDetails = {};
        }
        logicProgress.levelDetails[currentLevelNumber] = {
          stars: starsEarned,
          answers: { ...quizAnswers },
          completedDate: new Date().toISOString()
        };
        
        if (currentLevelNumber === logicProgress.currentLevel) {
          logicProgress.currentLevel = Math.min(10, currentLevelNumber + 1);
        }
      }
      
      // Update Firebase
      if (currentUser) {
        try {
          const updates = {};
          const userRef = ref(db, `users/${currentUser.uid}`);
          
          updates[`logic`] = logicProgress;
          
          const completedLevels = logicProgress.completed.length;
          updates[`progress/logic`] = completedLevels;
          
          const currentTotalStars = userData?.score || 0;
          updates[`score`] = currentTotalStars + starsEarned;
          
          await updateStreak();
          
          await update(userRef, updates);
          
          console.log('Logic progress saved to Firebase:', updates);
          
          let badgeMessage = '';
          if (currentLevelNumber % 3 === 0) {
            badgeMessage = `\n🎖️ You earned a logic badge for completing 3 levels!`;
          }
          
          alert(`🎉 Level ${currentLevelNumber} COMPLETED!\n\n⭐ Stars Earned: ${starsEarned}/5${badgeMessage}\n\n✅ Level ${logicProgress.currentLevel} is now unlocked!`);
          
        } catch (error) {
          console.error('Error saving logic progress:', error);
          alert('⚠️ Error saving progress. Please check your connection.');
        }
      }
      
      updateUI();
      closeCard();
    }

    async function updateStreak() {
      try {
        const today = new Date().toDateString();
        const lastLogin = userData?.lastLogin ? new Date(userData.lastLogin).toDateString() : null;
        
        let currentStreak = userData?.streak || 0;
        
        if (lastLogin === today) {
          return currentStreak;
        } else if (lastLogin && isYesterday(new Date(lastLogin))) {
          currentStreak += 1;
        } else {
          currentStreak = 1;
        }
        
        const userRef = ref(db, `users/${currentUser.uid}`);
        await update(userRef, {
          streak: currentStreak,
          lastLogin: new Date().toISOString()
        });
        
        return currentStreak;
      } catch (error) {
        console.error('Error updating streak:', error);
        return 0;
      }
    }

    function isYesterday(date) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      return date.toDateString() === yesterday.toDateString();
    }

    // Modal backdrop click
    elements.cardModal.addEventListener('click', (e) => {
      if (e.target === elements.cardModal) closeCard();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (elements.cardModal.style.display === 'flex') {
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === 'ArrowRight' || e.key === ' ') {
          e.preventDefault();
          nextCard();
        }
        if (e.key === 'Escape') closeCard();
      }
    });
  </script>
</body>
</html>
