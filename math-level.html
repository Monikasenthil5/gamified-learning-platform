<!DOCTYPE html>
<html lang="en">
<head>
  <title>🔢 Math Land - Levels</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Firebase CDN -->
  <script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js"
    }
  }
  </script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0A2647 0%, #144272 100%);
      color: white;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* Top Navigation - MATH THEME */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(135deg, #2E8B57, #4CAF50);
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo { font-size: 24px; font-weight: 700; color: white; }
    .nav-links { display: flex; gap: 20px; align-items: center; }
    .nav-link {
      color: white; text-decoration: none; font-weight: 500;
      padding: 8px 16px; border-radius: 20px; transition: all 0.3s ease;
    }
    .nav-link:hover { background: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .back-btn {
      background: rgba(255,255,255,0.2); padding: 10px 20px;
      border-radius: 25px; font-weight: 600;
    }
    .progress-info {
      background: rgba(255,255,255,0.18); padding: 8px 16px;
      border-radius: 20px; font-size: 14px; font-weight: 500;
    }

    /* Main Content - FULL WIDTH */
    .main-content { margin-top: 90px; padding: 20px; max-width: 1200px; margin-left: auto; margin-right: auto; }

    /* Level Map - MATH THEME */
    .level-section { text-align: center; margin-bottom: 40px; }
    .section-title {
      font-size: 32px; background: linear-gradient(135deg, #FFD93D, #6BCF9D);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px; font-weight: 700;
    }
    .map-container { display: flex; justify-content: center; align-items: center; margin: 30px 0; }
    .map-bg {
      position: relative; width: 950px; height: 450px; max-width: 95vw;
      border-radius: 35px; background: linear-gradient(135deg, #87CEEB 0%, #98FB98 25%, #FFD700 50%, #FFB6C1 75%, #E6E6FA 100%);
      box-shadow: 0 15px 40px rgba(135,206,235,0.4), 0 8px 25px rgba(0,0,0,0.3), inset 0 5px 20px rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .map-bg::before {
      content: ""; position: absolute; inset: 0;
      background: radial-gradient(ellipse 80px 40px at 12% 18%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 28% 32%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 45% 22%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 62% 38%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 82% 25%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 20% 68%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 38% 78%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 55% 70%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px),
                  radial-gradient(ellipse 80px 40px at 75% 82%, #FFFAF0 0%, #FFFAF0 35px, transparent 38px);
      opacity: 0.95;
    }

    /* Level Buttons - MATH THEME */
    .level-btn {
      position: absolute; width: 75px; height: 75px; border-radius: 50%;
      border: 6px solid #FFD700; background: radial-gradient(circle at 25% 25%, #ffffff 0%, #98FB98 40%, #2E8B57 100%);
      color: #003300; font-size: 26px; font-weight: 800; cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 3px 8px rgba(255,255,255,0.4);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 10; user-select: none;
    }
    .level-btn:hover:not(.locked):not(.completed) {
      transform: translateY(-5px) scale(1.08); box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      border-color: #FF6B6B;
    }
    .level-btn.locked {
      background: radial-gradient(circle at 25% 25%, #e0e0e0 0%, #b0b0b0 70%, #808080 100%);
      border-color: #888; color: #555; cursor: not-allowed; opacity: 0.7;
    }
    .level-btn.completed {
      background: radial-gradient(circle at 25% 25%, #fff5c0 0%, #FFD700 45%, #FF8C00 100%);
      border-color: #FF6B6B; color: #5a2700; animation: sparkle 2s infinite;
    }
    @keyframes sparkle {
      0%, 100% { box-shadow: 0 8px 20px rgba(255,215,0,0.6); }
      50% { box-shadow: 0 12px 30px rgba(255,107,107,0.8); }
    }

    .level-1 { left: 10%; top: 15%; }
    .level-2 { left: 27%; top: 28%; }
    .level-3 { left: 44%; top: 20%; }
    .level-4 { left: 61%; top: 34%; }
    .level-5 { left: 80%; top: 22%; }
    .level-6 { left: 16%; top: 65%; }
    .level-7 { left: 34%; top: 76%; }
    .level-8 { left: 52%; top: 67%; }
    .level-9 { left: 70%; top: 80%; }
    .level-10 { left: 86%; top: 70%; }

    /* Quiz Styles - MATH THEME */
    .quiz-question {
      background: rgba(255,255,255,0.05); border-radius: 15px;
      padding: 20px; margin: 15px 0; border-left: 4px solid #FFD700;
    }
    .question-text { 
      font-size: 18px; margin-bottom: 15px; font-weight: 500;
      color: #FFD700; 
    }
    .quiz-options { display: grid; gap: 10px; }
    .quiz-option {
      padding: 12px 16px; background: rgba(255,255,255,0.1);
      border-radius: 12px; border: 2px solid transparent;
      cursor: pointer; transition: all 0.2s ease; font-size: 16px;
    }
    .quiz-option:hover:not(.selected) { background: rgba(255,215,0,0.2); border-color: #FFD700; }
    .quiz-option.selected { background: rgba(76,175,80,0.3); border-color: #4CAF50; }
    .quiz-option.correct { background: rgba(76,175,80,0.3); border-color: #4CAF50; }
    .quiz-option.incorrect { background: rgba(244,67,54,0.3); border-color: #F44336; }

    /* Card Modal - MATH THEME */
    .card-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center;
      z-index: 200; backdrop-filter: blur(8px);
    }
    .card {
      width: 95%; max-width: 550px; max-height: 85vh;
      background: linear-gradient(135deg, #1B5E20, #4CAF50, #2E7D32);
      border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.6);
      overflow: hidden; animation: cardSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateY(50px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-header {
      padding: 20px 25px; background: rgba(0,0,0,0.3);
      display: flex; justify-content: space-between; align-items: center;
    }
    .card-type { font-size: 20px; font-weight: 600; color: #FFD700; }
    .close-card {
      background: none; border: none; font-size: 28px; color: #fff;
      cursor: pointer; padding: 5px; border-radius: 50%; transition: all 0.3s ease;
    }
    .close-card:hover { background: rgba(255,255,255,0.2); }
    .card-body {
      padding: 30px; max-height: 400px; overflow-y: auto; font-size: 18px; line-height: 1.6;
    }
    .card-footer {
      padding: 20px 25px; display: flex; justify-content: space-between;
      align-items: center; background: rgba(0,0,0,0.25); gap: 15px;
    }
    .nav-btn {
      flex: 1; padding: 12px 20px; border-radius: 25px; border: none;
      font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .nav-btn.prev { background: rgba(255,255,255,0.2); color: #fff; }
    .nav-btn.next { background: linear-gradient(45deg, #FFD700, #4CAF50); color: #2d1b00; }
    .nav-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
    .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .stars-display { 
      font-size: 16px; color: #FFD700; font-weight: 600; 
      min-width: 120px; text-align: center; 
      text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }

    /* Math Symbols Decoration */
    .math-symbol {
      position: absolute;
      font-size: 24px;
      color: rgba(255,255,255,0.1);
      animation: float 3s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 768px) {
      .map-bg { width: 95vw; height: 350px; }
      .level-btn { width: 60px; height: 60px; font-size: 22px; }
      .section-title { font-size: 28px; }
    }
  </style>
</head>
<body>
  <!-- Top Nav - MATH THEME -->
  <nav class="top-nav">
    <div class="logo">🔢 Math Land</div>
    <div class="nav-links">
      <a href="profile.html" class="nav-link">👤 Profile</a>
      <a href="courses.html" class="nav-link back-btn">← Back to Courses</a>
      <div class="progress-info">
        Level <span id="currentLevelInfo">1</span>/10 | ⭐ <span id="mathStars">0</span>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <section class="level-section">
      <h1 class="section-title" id="sectionTitle">🔢 Math Land</h1>
      <div class="map-container">
        <div class="map-bg">
          <button class="level-btn level-1" data-level="1">1</button>
          <button class="level-btn level-2 locked" data-level="2">2</button>
          <button class="level-btn level-3 locked" data-level="3">3</button>
          <button class="level-btn level-4 locked" data-level="4">4</button>
          <button class="level-btn level-5 locked" data-level="5">5</button>
          <button class="level-btn level-6 locked" data-level="6">6</button>
          <button class="level-btn level-7 locked" data-level="7">7</button>
          <button class="level-btn level-8 locked" data-level="8">8</button>
          <button class="level-btn level-9 locked" data-level="9">9</button>
          <button class="level-btn level-10 locked" data-level="10">10</button>
        </div>
      </div>
    </section>
  </main>

  <!-- Card Modal -->
  <div class="card-modal" id="cardModal">
    <div class="card">
      <div class="card-header">
        <span class="card-type" id="cardType">📚 Learning</span>
        <button class="close-card" id="closeBtn">×</button>
      </div>
      <div class="card-body" id="cardBody"></div>
      <div class="card-footer">
        <button class="nav-btn prev" id="prevBtn">← Previous</button>
        <div class="stars-display">
          ⭐ <span id="starsCounter">0</span> / <span id="totalStars">5</span>
        </div>
        <button class="nav-btn next" id="nextBtn">Next →</button>
      </div>
    </div>
  </div>

  <!-- JavaScript -->
  <script type="module">
    // Firebase Config - USE YOUR ACTUAL CONFIG
    const firebaseConfig = {
      apiKey: "AIzaSyA1lno70d82bnOlBeb0ShRS-PW6cE4PAX8",
      authDomain: "learnapp-683e9.firebaseapp.com",
      projectId: "learnapp-683e9",
      storageBucket: "learnapp-683e9.firebasestorage.app",
      messagingSenderId: "989728103752",
      appId: "1:989728103752:web:c0a228b0d2ef2e6cf3277d",
    };

    import { initializeApp } from 'firebase/app';
    import { getAuth, onAuthStateChanged } from 'firebase/auth';
    import { getDatabase, ref, onValue, update, get } from 'firebase/database';

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Level 1 Content: Using questions from your Math Land code
    const mathLevel1 = {
      title: "➕ Basic Addition & Subtraction",
      cards: [
        // 5 LEARNING CARDS
        { type: "📚", content: "Numbers help us count things around us. Let's learn about numbers 1 to 10!", isQuiz: false },
        { type: "🔢", content: "Counting objects helps us understand numbers better. Point and count one object at a time.", isQuiz: false },
        { type: "🔵", content: "Even numbers can be divided into 2 equal groups. Examples: 2, 4, 6, 8, 10", isQuiz: false },
        { type: "⚫", content: "Odd numbers leave one number when divided into 2 equal groups. Examples: 1, 3, 5, 7, 9", isQuiz: false },
        { type: "🎯", content: "Let's review what we learned about numbers and counting!", isQuiz: false },
        
        // 5 TEST QUESTIONS (from your original code)
        { 
          type: "❓", content: {
            question: "2 + 1 = ?",
            options: ["1", "2", "3"],
            correct: 2,
            explanation: "2 + 1 = 3. Count forward: 2... 3!"
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", content: {
            question: "5 - 2 = ?",
            options: ["2", "3", "4"],
            correct: 1,
            explanation: "5 - 2 = 3. Count backward from 5: 5, 4, 3!"
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", content: {
            question: "3 + 3 = ?",
            options: ["5", "6", "7"],
            correct: 1,
            explanation: "3 + 3 = 6. Double 3 makes 6!"
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", content: {
            question: "10 - 5 = ?",
            options: ["4", "5", "6"],
            correct: 1,
            explanation: "10 - 5 = 5. Half of 10 is 5!"
          }, 
          isQuiz: true 
        },
        { 
          type: "❓", content: {
            question: "1 + 4 = ?",
            options: ["4", "5", "6"],
            correct: 1,
            explanation: "1 + 4 = 5. Start at 1, count 4 more: 2, 3, 4, 5!"
          }, 
          isQuiz: true 
        }
      ]
    };

    // Additional level content can be added here for levels 2-10

    // Global State
    let currentUser = null;
    let userData = null;
    let mathProgress = { currentLevel: 1, stars: 0, totalStars: 0, completed: [] };
    let currentLevelCards = [];
    let currentCardIndex = 0;
    let quizAnswers = {};
    let quizSubmitted = false;
    let levelStarsEarned = 0;
    let currentLevelNumber = 1;

    // DOM Elements
    const elements = {
      levelBtns: document.querySelectorAll('.level-btn'),
      cardModal: document.getElementById('cardModal'),
      cardType: document.getElementById('cardType'),
      cardBody: document.getElementById('cardBody'),
      prevBtn: document.getElementById('prevBtn'),
      nextBtn: document.getElementById('nextBtn'),
      closeBtn: document.getElementById('closeBtn'),
      starsCounter: document.getElementById('starsCounter'),
      totalStars: document.getElementById('totalStars'),
      currentLevelInfo: document.getElementById('currentLevelInfo'),
      mathStars: document.getElementById('mathStars'),
      sectionTitle: document.getElementById('sectionTitle')
    };

    // Initialize
    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      if (user) {
        await loadUserProgress();
      } else {
        window.location.href = 'login.html';
        return;
      }
      setupEventListeners();
    });

    function setupEventListeners() {
      elements.levelBtns.forEach(btn => {
        btn.addEventListener('click', handleLevelClick);
      });
      
      elements.prevBtn.addEventListener('click', prevCard);
      elements.nextBtn.addEventListener('click', nextCard);
      elements.closeBtn.addEventListener('click', closeCard);
      
      elements.prevBtn.disabled = true;
    }

    async function loadUserProgress() {
      const userRef = ref(db, `users/${currentUser.uid}`);
      onValue(userRef, (snapshot) => {
        userData = snapshot.val();
        if (userData) {
          // Load math progress or initialize if doesn't exist
          if (userData.math) {
            mathProgress = userData.math;
          } else {
            mathProgress = { 
              currentLevel: 1, 
              stars: 0, 
              totalStars: 0, 
              completed: [],
              levelDetails: {}
            };
          }
          
          // Check for progress in the old format
          if (userData.progress?.math && typeof userData.progress.math === 'number') {
            mathProgress.currentLevel = Math.max(mathProgress.currentLevel, userData.progress.math + 1);
            mathProgress.stars = (userData.progress.math || 0) * 5;
            mathProgress.totalStars = (userData.progress.math || 0) * 5;
          }
          
          updateUI();
        }
      });
    }

    function updateUI() {
      elements.levelBtns.forEach(btn => {
        const levelNum = parseInt(btn.dataset.level);
        btn.classList.remove('completed', 'locked');
        
        if (mathProgress.completed.includes(levelNum)) {
          btn.classList.add('completed');
        } else if (levelNum > mathProgress.currentLevel) {
          btn.classList.add('locked');
        }
      });
      
      elements.currentLevelInfo.textContent = mathProgress.currentLevel;
      elements.mathStars.textContent = mathProgress.stars || 0;
    }

    function handleLevelClick() {
      const levelNum = parseInt(this.dataset.level);
      
      if (this.classList.contains('locked')) {
        alert('🔒 Complete previous levels first!');
        return;
      }
      
      const isLevelCompleted = mathProgress.completed.includes(levelNum);
      
      currentLevelNumber = levelNum;
      loadLevelContent(levelNum, isLevelCompleted);
      showCardModal();
    }

    function loadLevelContent(levelNum, isLevelCompleted = false) {
      // For now, we only have level 1 content
      // You can add content for other levels following the same pattern
      if (levelNum === 1) {
        currentLevelCards = mathLevel1.cards;
        elements.sectionTitle.textContent = mathLevel1.title;
      } else {
        // Placeholder for other levels
        currentLevelCards = [
          { type: "📚", content: `Level ${levelNum} - Coming Soon! More math fun ahead!`, isQuiz: false },
          { type: "⭐", content: `🎉 Level ${levelNum} will be available soon! Keep practicing!`, isQuiz: false }
        ];
      }
      
      currentCardIndex = 0;
      quizAnswers = {};
      quizSubmitted = false;
      levelStarsEarned = 0;
      
      // If level is already completed, load previous answers
      if (isLevelCompleted && mathProgress.levelDetails && mathProgress.levelDetails[levelNum]) {
        quizAnswers = mathProgress.levelDetails[levelNum].answers || {};
        levelStarsEarned = mathProgress.levelDetails[levelNum].stars || 0;
      }
      
      showCurrentCard();
    }

    function showCardModal() {
      elements.cardModal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeCard() {
      elements.cardModal.style.display = 'none';
      document.body.style.overflow = 'auto';
      
      if (!quizSubmitted) {
        quizAnswers = {};
        levelStarsEarned = 0;
      }
    }

    function showCurrentCard() {
      const card = currentLevelCards[currentCardIndex];
      
      if (card.isQuiz) {
        renderQuiz(card);
      } else {
        elements.cardType.textContent = card.type;
        elements.cardBody.innerHTML = `<p style="margin: 0; font-size: 18px; line-height: 1.6;">${card.content}</p>`;
      }

      elements.prevBtn.disabled = currentCardIndex === 0;
      const isLastCard = currentCardIndex === currentLevelCards.length - 1;
      
      // Calculate current stars (only count quiz cards that have been answered)
      let earnedStars = 0;
      if (quizSubmitted) {
        earnedStars = levelStarsEarned;
      } else {
        Object.keys(quizAnswers).forEach(cardIdx => {
          const cardIndex = parseInt(cardIdx);
          if (currentLevelCards[cardIndex]?.isQuiz) {
            const cardData = currentLevelCards[cardIndex].content;
            if (quizAnswers[cardIndex] === cardData.correct) {
              earnedStars += 1;
            }
          }
        });
      }
      
      elements.starsCounter.textContent = earnedStars;
      elements.totalStars.textContent = '5';
      
      // Update next button text
      if (isLastCard) {
        if (quizSubmitted) {
          elements.nextBtn.textContent = '🎉 Finish Level!';
        } else {
          elements.nextBtn.textContent = '📊 Check Results';
        }
      } else {
        elements.nextBtn.textContent = 'Next →';
      }
    }

    function renderQuiz(card) {
      const q = card.content;
      elements.cardType.textContent = card.type;
      
      let html = `
        <div class="quiz-question">
          <div class="question-text">${q.question}</div>
          <div class="quiz-options">`;
      
      q.options.forEach((option, index) => {
        const selected = quizAnswers[currentCardIndex] === index;
        const isCorrectAnswer = index === q.correct;
        let classes = 'quiz-option';
        
        if (selected) {
          classes += ' selected';
          if (quizSubmitted) {
            classes += isCorrectAnswer ? ' correct' : ' incorrect';
          }
        }
        
        if (quizSubmitted && isCorrectAnswer && !selected) {
          classes += ' correct';
        }
        
        const onClick = quizSubmitted ? '' : `onclick="selectAnswer(${currentCardIndex}, ${index})"`;
        const style = quizSubmitted ? 'cursor: default;' : '';
        
        html += `<div class="${classes}" ${onClick} style="${style}">${option}</div>`;
      });
      
      if (quizSubmitted && q.explanation) {
        html += `<div style="margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 10px; font-size: 14px;">
                  <strong>💡 Explanation:</strong> ${q.explanation}
                </div>`;
      }
      
      html += `</div></div>`;
      elements.cardBody.innerHTML = html;
    }

    // Global function for quiz selection
    window.selectAnswer = function(cardIndex, optionIndex) {
      if (quizSubmitted) return;
      
      quizAnswers[cardIndex] = optionIndex;
      showCurrentCard();
    };

    function prevCard() {
      if (currentCardIndex > 0) {
        currentCardIndex--;
        showCurrentCard();
      }
    }

    function nextCard() {
      const currentCard = currentLevelCards[currentCardIndex];
      
      if (currentCard?.isQuiz && !quizSubmitted && quizAnswers[currentCardIndex] === undefined) {
        alert('⚠️ Please select an answer before proceeding!');
        return;
      }
      
      if (currentCardIndex === currentLevelCards.length - 1 && !quizSubmitted) {
        submitQuiz();
        return;
      }
      
      if (currentCardIndex === currentLevelCards.length - 1 && quizSubmitted) {
        completeLevel();
        return;
      }
      
      if (currentCardIndex < currentLevelCards.length - 1) {
        currentCardIndex++;
        showCurrentCard();
      }
    }

    function submitQuiz() {
      let stars = 0;
      Object.keys(quizAnswers).forEach(cardIdx => {
        const idx = parseInt(cardIdx);
        if (currentLevelCards[idx]?.isQuiz) {
          const cardData = currentLevelCards[idx].content;
          if (quizAnswers[idx] === cardData.correct) {
            stars += 1;
          }
        }
      });
      
      levelStarsEarned = stars;
      quizSubmitted = true;
      
      alert(`📊 Quiz Results!\n\n✅ You got ${stars} out of 5 questions correct!\n⭐ You earned ${stars} stars!`);
      
      showCurrentCard();
    }

    async function completeLevel() {
      const starsEarned = levelStarsEarned;
      
      if (!mathProgress.completed.includes(currentLevelNumber)) {
        mathProgress.completed.push(currentLevelNumber);
        mathProgress.stars = (mathProgress.stars || 0) + starsEarned;
        mathProgress.totalStars = (mathProgress.totalStars || 0) + 5;
        
        if (!mathProgress.levelDetails) {
          mathProgress.levelDetails = {};
        }
        mathProgress.levelDetails[currentLevelNumber] = {
          stars: starsEarned,
          answers: { ...quizAnswers },
          completedDate: new Date().toISOString()
        };
        
        if (currentLevelNumber === mathProgress.currentLevel) {
          mathProgress.currentLevel = Math.min(10, currentLevelNumber + 1);
        }
      }
      
      // Update Firebase
      if (currentUser) {
        try {
          const updates = {};
          const userRef = ref(db, `users/${currentUser.uid}`);
          
          updates[`math`] = mathProgress;
          
          const completedLevels = mathProgress.completed.length;
          updates[`progress/math`] = completedLevels;
          
          const currentTotalStars = userData?.score || 0;
          updates[`score`] = currentTotalStars + starsEarned;
          
          await updateStreak();
          
          await update(userRef, updates);
          
          console.log('Math progress saved to Firebase:', updates);
          
          let badgeMessage = '';
          if (currentLevelNumber % 3 === 0) {
            badgeMessage = `\n🎖️ You earned a math badge for completing 3 levels!`;
          }
          
          alert(`🎉 Level ${currentLevelNumber} COMPLETED!\n\n⭐ Stars Earned: ${starsEarned}/5${badgeMessage}\n\n✅ Level ${mathProgress.currentLevel} is now unlocked!`);
          
        } catch (error) {
          console.error('Error saving math progress:', error);
          alert('⚠️ Error saving progress. Please check your connection.');
        }
      }
      
      updateUI();
      closeCard();
    }

    async function updateStreak() {
      try {
        const today = new Date().toDateString();
        const lastLogin = userData?.lastLogin ? new Date(userData.lastLogin).toDateString() : null;
        
        let currentStreak = userData?.streak || 0;
        
        if (lastLogin === today) {
          return currentStreak;
        } else if (lastLogin && isYesterday(new Date(lastLogin))) {
          currentStreak += 1;
        } else {
          currentStreak = 1;
        }
        
        const userRef = ref(db, `users/${currentUser.uid}`);
        await update(userRef, {
          streak: currentStreak,
          lastLogin: new Date().toISOString()
        });
        
        return currentStreak;
      } catch (error) {
        console.error('Error updating streak:', error);
        return 0;
      }
    }

    function isYesterday(date) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      return date.toDateString() === yesterday.toDateString();
    }

    // Modal backdrop click
    elements.cardModal.addEventListener('click', (e) => {
      if (e.target === elements.cardModal) closeCard();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (elements.cardModal.style.display === 'flex') {
        if (e.key === 'ArrowLeft') prevCard();
        if (e.key === 'ArrowRight' || e.key === ' ') {
          e.preventDefault();
          nextCard();
        }
        if (e.key === 'Escape') closeCard();
      }
    });
  </script>
</body>
</html>
